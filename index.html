<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#246b8f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="共同記帳">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.svg">
  <title>多人共同記帳</title>
  <style>
    :root {
      --ink: #202936;
      --muted: #667085;
      --line: #d7dde6;
      --paper: #f6f8fb;
      --panel: #ffffff;
      --accent: #246b8f;
      --accent-strong: #174b68;
      --good: #12805c;
      --bad: #c54f3e;
      --gold: #b7791f;
      --shadow: 0 14px 34px rgba(32, 41, 54, .10);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      -webkit-text-size-adjust: 100%;
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      background:
        linear-gradient(135deg, rgba(36, 107, 143, .11), transparent 36%),
        linear-gradient(315deg, rgba(183, 121, 31, .10), transparent 42%),
        var(--paper);
    }

    button,
    input,
    select {
      font: inherit;
      touch-action: manipulation;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: max(28px, env(safe-area-inset-top)) 0 max(36px, env(safe-area-inset-bottom));
    }

    header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: clamp(30px, 4vw, 46px);
      line-height: 1.05;
      letter-spacing: 0;
    }

    h2,
    h3,
    p {
      margin-top: 0;
    }

    .subtitle {
      margin-bottom: 0;
      color: var(--muted);
      font-size: 15px;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 10px;
    }

    .btn {
      min-height: 44px;
      border-radius: 8px;
      padding: 0 15px;
      color: #fff;
      background: var(--accent);
      box-shadow: 0 8px 18px rgba(36, 107, 143, .22);
    }

    .btn:hover {
      background: var(--accent-strong);
    }

    .btn.secondary {
      color: var(--ink);
      background: #e9eef4;
      box-shadow: none;
    }

    .btn.danger {
      background: rgba(197, 79, 62, .11);
      color: var(--bad);
      box-shadow: none;
    }

    .panel {
      border: 1px solid rgba(215, 221, 230, .95);
      border-radius: 8px;
      background: rgba(255, 255, 255, .95);
      box-shadow: var(--shadow);
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 16px;
    }

    .metric {
      min-height: 108px;
      padding: 16px;
      display: grid;
      align-content: space-between;
    }

    .metric small {
      color: var(--muted);
      font-weight: 800;
    }

    .metric strong {
      font-size: clamp(22px, 3vw, 31px);
      line-height: 1.05;
      word-break: break-word;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(290px, 380px) 1fr;
      gap: 18px;
      align-items: start;
    }

    .side {
      display: grid;
      gap: 14px;
      position: sticky;
      top: 18px;
    }

    .section {
      padding: 16px;
    }

    .panel-title {
      margin-bottom: 14px;
      font-size: 19px;
      line-height: 1.2;
    }

    form,
    .field-grid,
    .stack {
      display: grid;
      gap: 12px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    label {
      display: grid;
      gap: 7px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    input,
    select,
    textarea {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px 11px;
      font-size: 16px;
      color: var(--ink);
      background: #fff;
      outline: none;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(36, 107, 143, .16);
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 14px;
    }

    .tab {
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--muted);
      background: #fff;
      font-weight: 900;
    }

    .tab.active {
      border-color: rgba(36, 107, 143, .35);
      color: var(--accent-strong);
      background: rgba(36, 107, 143, .10);
    }

    .view {
      display: none;
    }

    .view.active {
      display: grid;
      gap: 14px;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip{
  display:inline-flex;
  align-items:center;
  gap:6px;
  min-height:30px;
  border-radius:999px;
  padding:0 11px;
  color:var(--accent-strong);
  background:#eef3f7;
  font-size:13px;
  font-weight:900;
}

.delete-user{
  border:none;
  background:transparent;
  color:#c54f3e;
  cursor:pointer;
  font-size:16px;
  font-weight:bold;
  padding:0;
}

.delete-user:hover{
  color:red;
}

.delete-user:hover{
  color:red;
}
    .tag {
      display: inline-grid;
      place-items: center;
      min-height: 30px;
      border-radius: 999px;
      padding: 0 11px;
      color: var(--accent-strong);
      background: #eef3f7;
      font-size: 13px;
      font-weight: 900;
      white-space: nowrap;
    }

    .chip.good {
      color: var(--good);
      background: rgba(18, 128, 92, .10);
    }

    .chip.bad {
      color: var(--bad);
      background: rgba(197, 79, 62, .10);
    }

    .split-inputs {
      display: grid;
      gap: 9px;
    }

    .person-row {
      display: grid;
      grid-template-columns: minmax(90px, 1fr) minmax(120px, 1fr);
      gap: 9px;
      align-items: end;
    }

    .filters {
      display: grid;
      grid-template-columns: 1.2fr .8fr .8fr;
      gap: 10px;
      margin-bottom: 12px;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      min-width: 760px;
      border-collapse: collapse;
    }

    th,
    td {
      padding: 12px 13px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: middle;
    }

    th {
      color: var(--muted);
      font-size: 12px;
      background: #fbfcfe;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .amount {
      font-weight: 900;
      white-space: nowrap;
    }

    .good-text {
      color: var(--good);
    }

    .bad-text {
      color: var(--bad);
    }

    .accent-text {
      color: var(--accent-strong);
    }

    .delete-btn {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      color: var(--bad);
      background: rgba(197, 79, 62, .10);
      font-size: 18px;
      line-height: 1;
    }

    .edit-btn {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      color: var(--accent-strong);
      background: rgba(36, 107, 143, .10);
      font-size: 16px;
      line-height: 1;
      margin-left: 4px;
    }

    .empty {
      padding: 34px 12px;
      text-align: center;
      color: var(--muted);
    }

    .settlement-grid {
      display: grid;
      grid-template-columns: 1.15fr .85fr;
      gap: 12px;
    }

    .list {
      display: grid;
      gap: 10px;
    }

    .card-line {
      display: grid;
      gap: 5px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    .line-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      font-weight: 900;
    }

    .mini {
      color: var(--muted);
      font-size: 13px;
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      max-width: min(340px, calc(100vw - 36px));
      padding: 12px 14px;
      border-radius: 8px;
      color: #fff;
      background: var(--ink);
      box-shadow: var(--shadow);
      opacity: 0;
      transform: translateY(12px);
      pointer-events: none;
      transition: opacity .2s ease, transform .2s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 900px) {
      header,
      .layout,
      .settlement-grid {
        display: block;
      }

      .toolbar {
        justify-content: flex-start;
        margin-top: 14px;
      }

      .side {
        position: static;
        margin-bottom: 14px;
      }

      .summary-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .settlement-grid .panel + .panel {
        margin-top: 12px;
      }
    }

    @media (max-width: 560px) {
      .app {
        width: min(100% - 20px, 1180px);
        padding-top: max(18px, env(safe-area-inset-top));
      }

      h1 {
        font-size: 30px;
      }

      .subtitle {
        font-size: 14px;
      }

      .summary-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .metric {
        min-height: 86px;
        padding: 11px 10px;
      }

      .metric small {
        font-size: 12px;
      }

      .metric strong {
        font-size: 20px;
      }

      .row,
      .person-row,
      .filters {
        grid-template-columns: 1fr;
      }

      .tabs {
        grid-template-columns: repeat(2, 1fr);
      }

      .btn,
      input,
      select,
      .tab {
        min-height: 48px;
      }

      .toolbar .btn {
        flex: 1 1 140px;
      }

      .table-wrap {
        overflow: visible;
      }

      table,
      thead,
      tbody,
      tr,
      td {
        display: block;
        width: 100%;
        min-width: 0;
      }

      table {
        border-collapse: separate;
        border-spacing: 0 10px;
      }

      thead {
        display: none;
      }

      tr {
        padding: 13px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        box-shadow: 0 8px 20px rgba(32, 41, 54, .08);
      }

      td {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        padding: 8px 0;
        border-bottom: 1px solid #eef2f6;
        text-align: right;
      }

      td::before {
        content: attr(data-label);
        color: var(--muted);
        font-size: 12px;
        font-weight: 900;
        text-align: left;
      }

      td:last-child {
        border-bottom: 0;
      }

      .delete-btn {
        width: 44px;
        height: 44px;
        margin-left: auto;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <div>
        <h1>多人共同記帳</h1>
        <p class="subtitle">記錄每個人投入的共同基金、誰先付款、基金支付、分類與最後結算。</p>
      </div>
      <div class="toolbar" aria-label="資料工具">
        <button class="btn secondary" id="exportBtn" type="button">匯出 CSV</button>
      <button class="btn danger" id="clearBtn" type="button">清空資料</button>
      <span id="syncStatus" class="subtitle" style="align-self: center; margin-left: auto;">尚未同步</span>
      </div>
    </header>

    <section class="panel section" id="groupPanel">
      <h2 class="panel-title">群組管理</h2>
      <div class="stack">
        <div class="row">
          <label>
            群組邀請碼
            <input id="groupCode" type="text" placeholder="輸入邀請碼加入群組">
          </label>
          <button class="btn secondary" type="button" id="joinGroupBtn">加入群組</button>
        </div>
        <div class="row">
          <button class="btn" type="button" id="createGroupBtn">建立新群組</button>
        </div>
        <div class="subtitle" id="groupInfo">尚未加入群組。</div>
      </div>
    </section>

    <section class="summary-grid" aria-label="共同帳本摘要">
      <article class="panel metric">
        <small>總花費</small>
        <strong class="bad-text" id="totalSpent">$0</strong>
      </article>
      <article class="panel metric">
        <small>每人平均</small>
        <strong class="accent-text" id="averageSpent">$0</strong>
      </article>
      <article class="panel metric">
        <small>共同基金餘額</small>
        <strong class="good-text" id="fundBalance">$0</strong>
      </article>
      <article class="panel metric">
        <small>使用者</small>
        <strong class="accent-text" id="userCount">0</strong>
      </article>
    </section>

    <section class="layout">
      <aside class="side">
        <section class="panel section">
          <h2 class="panel-title">使用者</h2>
          <form id="userForm">
            <label>
              新增使用者
              <input id="userName" type="text" maxlength="18" placeholder="例如 小明" required>
            </label>
            <button class="btn" type="submit">加入使用者</button>
          </form>
          <div class="chips" id="userChips"></div>
        </section>

        <section class="panel section">
          <h2 class="panel-title">共同基金 / 追加基金</h2>
          <form id="fundForm">
            <div class="row">
              <label>
                日期
                <input id="fundDate" type="date" required>
              </label>
              <label>
                備註
                <input id="fundNote" type="text" maxlength="40" placeholder="第一次投入、追加...">
              </label>
            </div>
            <div class="split-inputs" id="fundInputs"></div>
            <button class="btn" type="submit">記錄基金</button>
          </form>
        </section>
      </aside>

      <div>
        <section class="tabs" aria-label="主要功能">
          <button class="tab active" type="button" data-view="expenseView">支出</button>
          <button class="tab" type="button" data-view="ledgerView">紀錄</button>
          <button class="tab" type="button" data-view="settlementView">結算</button>
          <button class="tab" type="button" data-view="categoryView">分類</button>
        </section>

        <section class="view active" id="expenseView">
          <section class="panel section">
            <h2 class="panel-title">新增支出</h2>
            <form id="expenseForm">
              <div class="row">
                <label>
                  日期
                  <input id="expenseDate" type="date" required>
                </label>
                <label>
                  金額
                  <input id="expenseAmount" type="number" min="1" step="1" inputmode="numeric" placeholder="例如 850" required>
                </label>
              </div>
              <div class="row">
                <label>
                  支付方式
                  <select id="paidBy" required></select>
                </label>
                <label>
                  分類
                  <select id="category" required>
                    <option>餐飲</option>
                    <option>交通</option>
                    <option>住宿</option>
                    <option>門票</option>
                    <option>採買</option>
                    <option>娛樂</option>
                    <option>其他</option>
                  </select>
                </label>
              </div>
              <label>
                備註
                <input id="expenseNote" type="text" maxlength="50" placeholder="晚餐、計程車、民宿尾款...">
              </label>
              <label>
                發票內容 / 收據文字
                <textarea id="invoiceText" placeholder="貼上發票文字、收據內容或簡要說明..."></textarea>
              </label>
              <label>
                拍發票照片
                <input id="invoiceImage" type="file" accept="image/*" capture="environment">
              </label>
              <div class="row">
                <button class="btn secondary" type="button" id="parseInvoiceBtn">自動擷取發票</button>
                <button class="btn secondary" type="button" id="clearInvoiceBtn">清除發票資料</button>
              </div>
              <div class="subtitle" id="invoicePreview" hidden></div>
              <button class="btn" type="submit">加入支出</button>
            </form>
          </section>
        </section>

        <section class="view" id="ledgerView">
          <section class="panel section" id="editFormSection" hidden>
            <h2 class="panel-title">編輯紀錄</h2>
            <form id="editForm">
              <div class="row">
                <label>
                  日期
                  <input id="editDate" type="date" required>
                </label>
                <label>
                  金額
                  <input id="editAmount" type="number" min="1" step="1" inputmode="numeric" required>
                </label>
              </div>
              <div class="row">
                <label>
                  分類
                  <select id="editCategory">
                    <option>餐飲</option>
                    <option>交通</option>
                    <option>住宿</option>
                    <option>門票</option>
                    <option>採買</option>
                    <option>娛樂</option>
                    <option>其他</option>
                  </select>
                </label>
              </div>
              <label>
                備註
                <input id="editNote" type="text" maxlength="50">
              </label>
              <div class="row">
                <button class="btn" type="submit">儲存編輯</button>
                <button class="btn secondary" type="button" id="cancelEditBtn">取消</button>
              </div>
            </form>
          </section>

          <section class="panel section">
            <h2 class="panel-title">所有紀錄</h2>
            <div class="filters">
              <label>
                搜尋
                <input id="search" type="search" placeholder="搜尋備註、分類、使用者">
              </label>
              <label>
                月份
                <input id="monthFilter" type="month">
              </label>
              <label>
                類型
                <select id="typeFilter">
                  <option value="all">全部</option>
                  <option value="expense">支出</option>
                  <option value="fund">共同基金</option>
                </select>
              </label>
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>日期</th>
                    <th>類型</th>
                    <th>支付/提供者</th>
                    <th>分類</th>
                    <th>備註</th>
                    <th>金額</th>
                    <th>操作</th>
                  </tr>
                </thead>
                <tbody id="ledgerList"></tbody>
              </table>
            </div>
            <div class="empty" id="emptyState" hidden>目前沒有符合條件的紀錄。</div>
          </section>
        </section>

        <section class="view" id="settlementView">
          <section class="settlement-grid">
            <article class="panel section">
              <h2 class="panel-title">每位使用者差額</h2>
              <div class="list" id="balanceList"></div>
            </article>
            <article class="panel section">
              <h2 class="panel-title">誰付給誰</h2>
              <div class="list" id="transferList"></div>
            </article>
          </section>
        </section>

        <section class="view" id="categoryView">
          <section class="panel section">
            <h2 class="panel-title">支出分類</h2>
            <div class="list" id="categoryList"></div>
          </section>
        </section>
      </div>
    </section>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4.1.3/dist/tesseract.min.js"></script>

  <script>
    const storageKey = "shared-ledger-v1";
    const categories = ["餐飲", "交通", "住宿", "門票", "採買", "娛樂", "其他"];
    const state = loadState();
    const groupStorageKey = "shared-ledger-group-id";

        if (saved && Array.isArray(saved.users) && Array.isArray(saved.entries)) {
          return { users: saved.users, entries: saved.entries };
        }
      } catch {}
      return { users: [], entries: [] };
    }

      localStorage.setItem(storageKey, JSON.stringify(payload));

    async function syncToGroup() {
    if (!currentGroupId) return;

    await window.updateDoc(
    window.doc(window.db,"groups",currentGroupId),
        {
            users: state.users,
            entries: state.entries,
            updatedAt: Date.now()
        }
    );

    }

    function mergeState(local, remote) {
      const merged = {
        users: [],
        entries: []
      };
      const userMap = new Map();
      [...local.users, ...remote.users].forEach(user => {
        if (!user || !user.id) return;
        const existing = userMap.get(user.id);
        if (!existing || existing.name !== user.name) userMap.set(user.id, user);
      });
      merged.users = Array.from(userMap.values());
      const entryMap = new Map();
      [...local.entries, ...remote.entries].forEach(entry => {
        if (!entry || !entry.id) return;
        const existing = entryMap.get(entry.id);
        if (!existing || entry.createdAt > existing.createdAt) entryMap.set(entry.id, entry);
      });
      merged.entries = Array.from(entryMap.values());
      return merged;
    }

    function guessCategory(text) {
      const normalized = text.toLowerCase();
      const categoryMap = [
        { keywords: ["餐", "飲", "咖啡", "早餐", "午餐", "晚餐", "餐廳"], category: "餐飲" },
        { keywords: ["計程車", "車資", "捷運", "公車", "交通"], category: "交通" },
        { keywords: ["旅館", "飯店", "民宿", "住宿"], category: "住宿" },
        { keywords: ["門票", "票", "景點", "表演"], category: "門票" },
        { keywords: ["超商", "超市", "購物", "採買", "便利商店", "賣場"], category: "採買" },
        { keywords: ["電影", "遊樂", "娛樂", "泡湯", "唱歌"], category: "娛樂" }
      ];
      for (const item of categoryMap) {
        if (item.keywords.some(word => normalized.includes(word))) return item.category;
      }
      return null;
    }

    function extractInvoiceNote(text) {
      const cleaned = text.trim().replace(/\s+/g, " ").slice(0, 120);
      const keywordMatch = cleaned.match(/(?:餐飲|交通|住宿|門票|採買|娛樂|購物|計程車|車資|飯店|民宿|超商|超市|餐廳|晚餐|午餐|早餐|票|景點).*/i);
      return keywordMatch ? keywordMatch[0] : cleaned;
    }

    async function ensureOCRWorker() {

      invoiceOCRWorker = Tesseract.createWorker({

    function parseInvoiceText() {
      const text = invoiceText.value.trim();
      if (!text) {
        showToast("請先貼上發票內容或簡要說明");
        return;
      }
      const amounts = [...text.matchAll(/((?:\d{1,3}(?:,\d{3})*|\d+)(?:\.\d{1,2})?)/g)].map(match => Number(match[1].replace(/,/g, ""))).filter(Number.isFinite);
      const amount = amounts.length ? Math.max(...amounts) : null;
      if (amount) expenseAmount.value = amount;
      const categoryName = guessCategory(text);
      if (categoryName) category.value = categoryName;
      expenseNote.value = extractInvoiceNote(text);
      setInvoicePreview(`已自動擷取發票資料，可再手動調整。金額：${amount ? money(amount) : "未找到"}。分類：${categoryName || "請選擇"}`);
      showToast("已自動擷取發票內容，請確認後再提交");
    }

    async function parseInvoiceFile(file) {
      const filenameText = file.name.replace(/[_\-.]/g, " ");
      invoiceText.value = filenameText;
      parseInvoiceText();
      const ocrText = await extractTextFromImage(file);
      if (ocrText) {

      }
    }

    function totals() {
      const totalSpent = state.entries
        .filter(entry => entry.type === "expense")
        .reduce((sum, entry) => sum + entry.amount, 0);
      const totalFund = state.entries
        .filter(entry => entry.type === "fund")
        .reduce((sum, entry) => sum + entry.contributions.reduce((part, item) => part + item.amount, 0), 0);
      const fundSpent = state.entries
        .filter(entry => entry.type === "expense" && entry.paidBy === "fund")
        .reduce((sum, entry) => sum + entry.amount, 0);
      const fundBalance = totalFund - fundSpent;
      const average = state.users.length ? totalSpent / state.users.length : 0;
      return { totalSpent, totalFund, fundSpent, fundBalance, average };
    }

    function settlement() {
      const { average, fundBalance } = totals();
      const sharedRemainingFund = state.users.length ? fundBalance / state.users.length : 0;
      const rows = state.users.map(user => {
        const directPaid = state.entries
          .filter(entry => entry.type === "expense" && entry.paidBy === user.id)
          .reduce((sum, entry) => sum + entry.amount, 0);
        const fundProvided = state.entries
          .filter(entry => entry.type === "fund")
          .reduce((sum, entry) => {
            const contribution = entry.contributions.find(item => item.userId === user.id);
            return sum + (contribution?.amount || 0);
          }, 0);
        const actualPaid = directPaid + fundProvided;
        const settlementPaid = actualPaid - sharedRemainingFund;
        const difference = settlementPaid - average;
        return { user, directPaid, fundProvided, actualPaid, settlementPaid, difference };
      });

      const debtors = rows
        .filter(row => row.difference < -0.5)
        .map(row => ({ name: row.user.name, amount: Math.abs(row.difference) }))
        .sort((a, b) => b.amount - a.amount);
      const creditors = rows
        .filter(row => row.difference > 0.5)
        .map(row => ({ name: row.user.name, amount: row.difference }))
        .sort((a, b) => b.amount - a.amount);
      const transfers = [];
      let debtorIndex = 0;
      let creditorIndex = 0;

      while (debtorIndex < debtors.length && creditorIndex < creditors.length) {
        const debtor = debtors[debtorIndex];
        const creditor = creditors[creditorIndex];
        const amount = Math.min(debtor.amount, creditor.amount);
        if (amount > 0.5) transfers.push({ from: debtor.name, to: creditor.name, amount });
        debtor.amount -= amount;
        creditor.amount -= amount;
        if (debtor.amount <= 0.5) debtorIndex += 1;
        if (creditor.amount <= 0.5) creditorIndex += 1;
      }

      return { rows, transfers };
    }

    state.users = state.users.filter(user => user.id !== userId);

    saveState();
    render();

    showToast("已刪除使用者");
});

    parseInvoiceBtn.addEventListener("click", parseInvoiceText);
    clearInvoiceBtn.addEventListener("click", clearInvoiceFields);
    document.querySelector("#editForm").addEventListener("submit", event => {
      event.preventDefault();
      saveEdit();
    });
    document.querySelector("#cancelEditBtn").addEventListener("click", cancelEdit);
    invoiceImage.addEventListener("change", () => {
      const file = invoiceImage.files?.[0];
      if (!file) {
        clearInvoiceFields();
        return;
      }
      parseInvoiceFile(file);
    });


    document.querySelector("#createGroupBtn").addEventListener("click", async () => {
      const groupId = crypto.randomUUID();

await window.createGroup(groupId);

currentGroupId = groupId;
localStorage.setItem(groupStorageKey, groupId);

console.log(localStorage.getItem(groupStorageKey));

await subscribeGroupChanges();

if (groupId) {
    document.querySelector("#groupCode").value = groupId;
}
    });
    document.querySelector("#joinGroupBtn").addEventListener("click", async () => {
  const code = document.querySelector("#groupCode").value.trim();

  if (!code) {
    showToast("請輸入邀請碼");
    return;
  }

  const ok = await joinGroup(code);

if (ok) {
    await subscribeGroupChanges();
}
});

    document.querySelectorAll(".tab").forEach(tab => {
      tab.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach(item => item.classList.remove("active"));
        document.querySelectorAll(".view").forEach(view => view.classList.remove("active"));
        tab.classList.add("active");
        document.querySelector(`#${tab.dataset.view}`).classList.add("active");
      });
    });

    [search, monthFilter, typeFilter].forEach(control => {
      control.addEventListener("input", renderLedger);
      control.addEventListener("change", renderLedger);
    });

    document.querySelector("#exportBtn").addEventListener("click", () => {
      if (!state.users.length && !state.entries.length) {
        showToast("目前沒有資料可以匯出");
        return;
      }
      const { totalSpent, average, fundBalance } = totals();
      const { rows, transfers } = settlement();
      const lines = [
        ["使用者"],
        ["姓名"],
        ...state.users.map(user => [user.name]),
        [],
        ["基金與支出紀錄"],
        ["日期", "類型", "支付/提供者", "分類", "備註", "金額"],
        ...state.entries.map(entry => [
          entry.date,
          entry.type === "expense" ? "支出" : "共同基金",
          entryPerson(entry),
          entry.category || "基金",
          entry.note || "",
          entry.type === "expense" ? entry.amount : entry.contributions.reduce((sum, item) => sum + item.amount, 0)
        ]),
        [],
        ["結算"],
        ["總花費", totalSpent],
        ["每人平均", average],
        ["共同基金餘額", fundBalance],
        ["姓名", "實際支付", "差額"],
        ...rows.map(row => [row.user.name, row.actualPaid, row.difference]),
        [],
        ["轉帳建議"],
        ["付款人", "收款人", "金額"],
        ...transfers.map(item => [item.from, item.to, item.amount])
      ];
      const csv = lines
        .map(row => row.map(value => `"${String(value ?? "").replaceAll('"', '""')}"`).join(","))
        .join("\n");
      const blob = new Blob(["\ufeff" + csv], { type: "text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = `共同記帳-${todayValue()}.csv`;
      link.click();
      URL.revokeObjectURL(url);
    });

    document.querySelector("#clearBtn").addEventListener("click", () => {
      if (!state.users.length && !state.entries.length) {
        showToast("目前沒有資料");
        return;
      }
      if (!confirm("確定要清空所有共同記帳資料嗎？")) return;
      state.users = [];
      state.entries = [];
      saveState();
      render();
      showToast("已清空資料");
    });

async function initialize() {
  console.log("initialize開始");
console.log(typeof loadGroup);
console.log(loadGroup);
    fundDate.value = todayValue();
    expenseDate.value = todayValue();
    monthFilter.value = currentMonthValue();

    window.addEventListener("pagehide", saveState);
    window.addEventListener("beforeunload", saveState);

    if (currentGroupId) {
    const ok = await joinGroup(currentGroupId);

    if (ok) {
        await subscribeGroupChanges();
    } else {
        clearGroupId();
        updateGroupUI("本機模式");
    }
} else {
    updateGroupUI("本機模式");
}

render();
}

initialize();
window.addEventListener('load', async () => {
    // 1. 從瀏覽器提取之前存過的群組 ID
    const savedGroupId = localStorage.getItem("shared-ledger-group-id");
    
    if (savedGroupId) {
        // 2. 自動填入輸入框（這一步你剛才已經成功了）
        const groupInput = document.querySelector("#groupCode");
        if (groupInput) {
            groupInput.value = savedGroupId;
        }

        // 加上一點小延遲（100毫秒），確保 Firebase 模組和 window 上的函式都綁定完成
        setTimeout(async () => {
            try {
                // 3. 【全自動核心】判斷 joinGroup 函式是否存在
                if (typeof joinGroup === 'function') {
                    console.log("【系統】偵測到歷史群組，正在嘗試全自動登入...", savedGroupId);
                    
                    // 執行自動加入
                    const success = await joinGroup(savedGroupId);
                    
                    // 4. 自動連線成功後，啟動即時更新監聽
                    if (success && typeof subscribeGroupChanges === 'function') {
                        subscribeGroupChanges();
                        console.log("【自動成功】全自動登入成功，並已開啟即時同步！");
                    }
                } else {
                    console.warn("【系統警告】此時尚未找到 joinGroup 函式，請確認是否被包裹在其他作用域中。");
                }
            } catch (error) {
                console.error("【自動失敗】全自動登入時發生錯誤：", error);
            }
        }, 100);
    }
});
  </script>
